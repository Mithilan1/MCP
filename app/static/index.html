<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitFlow</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Assignment 4 Demo Project</p>
      <h1>HabitFlow</h1>
      <p class="lede">Track a few simple habits, celebrate streaks, and keep the project small enough to explain clearly during your video walkthrough.</p>
    </section>

    <section class="panel summary-panel">
      <div class="summary-card">
        <span class="summary-label">Habits</span>
        <strong id="total-habits">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Completed now</span>
        <strong id="completed-now">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Best streak</span>
        <strong id="best-streak">0</strong>
      </div>
    </section>

    <section class="layout">
      <section class="panel">
        <h2>Add a habit</h2>
        <form id="habit-form" class="habit-form">
          <label>
            Habit name
            <input id="name" name="name" type="text" placeholder="Read for 20 minutes" required>
          </label>
          <label>
            Description
            <textarea id="description" name="description" rows="3" placeholder="A tiny habit that is easy to keep"></textarea>
          </label>
          <label>
            Frequency
            <select id="frequency" name="frequency">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
            </select>
          </label>
          <button type="submit">Create habit</button>
          <p id="form-message" class="form-message" role="status"></p>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Your tracker</h2>
          <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
        </div>
        <div id="habit-list" class="habit-list">
          <p class="empty-state">No habits yet. Add one to get started.</p>
        </div>
      </section>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
